name: Build and Export qBittorrent 4.3.9
on:
  workflow_dispatch: # 手动触发

jobs:
  build:
    runs-on: ubuntu-20.04 # 使用旧版Ubuntu确保兼容性
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:v0.8.3 # 使用旧版buildkit生成v2 schema1格式

      - name: Build Docker image
        run: |
          docker build -t qbittorrent:4.3.9 .

      - name: Export to pure .tar format
        run: |
          docker save -o qbittorrent-4.3.9.tar qbittorrent:4.3.9

      - name: Upload tar package
        uses: actions/upload-artifact@v4
        with:
          name: qbittorrent-4.3.9-tar
          path: qbittorrent-4.3.9.tar
          retention-days: 30 # 保留30天
